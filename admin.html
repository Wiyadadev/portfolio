<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
body {
  background: #0f172a;
  color: white;
  font-family: Arial;
  padding: 40px;
}

.card {
  background: #1e293b;
  padding: 15px;
  margin-bottom: 10px;
  border-radius: 8px;
}
</style>
</head>

<body>

<h1>Booking List</h1>
<div id="list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAGSFSYivH5ba5FnP5w3k0exLMGzzMsm-4",
  authDomain: "bar-booking-dddb1.firebaseapp.com",
  projectId: "bar-booking-dddb1",
  storageBucket: "bar-booking-dddb1.firebasestorage.app",
  messagingSenderId: "591362664905",
  appId: "1:591362664905:web:feeccad7fcfaadd497e018"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const list = document.getElementById("list");

const querySnapshot = await getDocs(collection(db, "bookings"));

querySnapshot.forEach((doc) => {
  const data = doc.data();

  const div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    <b>${data.name}</b><br>
    ${data.email}<br>
    ${data.people}<br>
    ${data.date} ${data.time}
  `;

  list.appendChild(div);
});
</script>

</body>
</html>
